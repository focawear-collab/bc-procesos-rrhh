<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario HR · Black Chicken</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f0f0f;color:#e8e8e8;min-height:100vh}
.back-hub{position:fixed;top:16px;left:16px;z-index:9999;display:inline-flex;align-items:center;gap:6px;background:rgba(26,26,26,.92);border:1px solid #2a2a2a;border-radius:8px;padding:8px 14px;color:#999;font-size:12px;font-weight:600;text-decoration:none;backdrop-filter:blur(8px);transition:all .2s}
.back-hub:hover{color:#d4af37;border-color:#d4af37}
.container{max-width:900px;margin:0 auto;padding:48px 32px}
h1{font-size:28px;font-weight:800;color:#fff;margin-bottom:4px}
.sub{font-size:13px;color:#666;margin-bottom:24px}
.source-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.source-tag.live{background:rgba(80,176,80,.2);color:#50b050}
.source-tag.static{background:rgba(224,192,80,.2);color:#e0c050}
.legend{display:flex;gap:16px;margin-bottom:20px;font-size:12px;color:#888;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px}
.dot{width:10px;height:10px;border-radius:50%}
.dot.red{background:#e05050}.dot.yellow{background:#e0c050}.dot.green{background:#50b050}.dot.blue{background:#5090e0}
.month-section{margin-bottom:28px}
.month-title{font-size:16px;font-weight:800;color:#d4af37;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #2a2a2a}
.event-list{display:flex;flex-direction:column;gap:6px}
.event{display:flex;align-items:center;gap:12px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:12px 16px;transition:border-color .2s}
.event:hover{border-color:#3a3a3a}
.event-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.event-date{font-size:12px;color:#666;width:70px;flex-shrink:0;font-weight:600}
.event-text{font-size:13px;color:#ccc;flex:1}
.event-text strong{color:#fff}
.event-tag{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700;text-transform:uppercase;white-space:nowrap}
.event-tag.contrato{background:rgba(224,192,80,.15);color:#e0c050}
.event-tag.cumpleanos{background:rgba(80,144,224,.15);color:#5090e0}
.event-tag.evaluacion,.event-tag.capacitacion{background:rgba(80,176,80,.15);color:#50b050}
.event-tag.feriado{background:rgba(224,80,80,.15);color:#e05050}
.event-tag.otro{background:rgba(150,150,150,.15);color:#999}
.note{background:#1a1a1a;border:1px solid #d4af37;border-radius:10px;padding:16px;font-size:13px;color:#ccc;margin-bottom:24px;line-height:1.6}
.note strong{color:#d4af37}
@media(max-width:640px){.container{padding:24px 16px}.event{flex-wrap:wrap;gap:8px}.event-date{width:auto}}
</style>
</head>
<body>
<a href="hub-index.html" class="back-hub"><span>←</span> Hub HR</a>
<div class="container">
<h1>Calendario HR</h1>
<p class="sub">Eventos, vencimientos y fechas clave · <span id="dataSource" class="source-tag static">Datos estáticos</span></p>

<div class="legend">
  <div class="legend-item"><div class="dot red"></div>Feriado / Cierre</div>
  <div class="legend-item"><div class="dot yellow"></div>Contrato / Renovación</div>
  <div class="legend-item"><div class="dot blue"></div>Cumpleaños</div>
  <div class="legend-item"><div class="dot green"></div>Evaluación / Hito</div>
</div>

<div id="calendar-content">
<!-- Feriados fijos (siempre se muestran) -->
</div>
</div>
<footer style="text-align:center;padding:20px;color:#444;font-size:11px;border-top:1px solid #2a2a2a">Black Chicken HR · Calendario · Uso exclusivo interno</footer>

<script>
var MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// Feriados Chile 2026 hardcoded
var feriados = [
  {fecha:'2026-01-01',titulo:'Año Nuevo',tipo:'feriado'},
  {fecha:'2026-05-01',titulo:'Día del Trabajo',tipo:'feriado'},
  {fecha:'2026-05-21',titulo:'Glorias Navales',tipo:'feriado'},
  {fecha:'2026-06-29',titulo:'San Pedro y San Pablo',tipo:'feriado'},
  {fecha:'2026-07-16',titulo:'Virgen del Carmen',tipo:'feriado'},
  {fecha:'2026-08-15',titulo:'Asunción de la Virgen',tipo:'feriado'},
  {fecha:'2026-09-18',titulo:'Fiestas Patrias',tipo:'feriado'},
  {fecha:'2026-09-19',titulo:'Glorias del Ejército',tipo:'feriado'},
  {fecha:'2026-10-12',titulo:'Encuentro de Dos Mundos',tipo:'feriado'},
  {fecha:'2026-10-31',titulo:'Día de las Iglesias Evangélicas',tipo:'feriado'},
  {fecha:'2026-11-01',titulo:'Día de Todos los Santos',tipo:'feriado'},
  {fecha:'2026-12-08',titulo:'Inmaculada Concepción',tipo:'feriado'},
  {fecha:'2026-12-25',titulo:'Navidad',tipo:'feriado'},
  {fecha:'2026-09-01',titulo:'Pago Aguinaldo Fiestas Patrias',tipo:'evaluacion',desc:'Para equipo con contrato indefinido'},
  {fecha:'2026-12-01',titulo:'Pago Aguinaldo Navidad',tipo:'evaluacion',desc:'Para equipo con contrato indefinido'}
];

var dotColors = {feriado:'#e05050',contrato:'#e0c050',cumpleanos:'#5090e0',evaluacion:'#50b050',capacitacion:'#50b050',otro:'#999'};

function renderCalendar(events) {
  // Agrupar por mes
  var byMonth = {};
  events.forEach(function(ev){
    var d = new Date(ev.fecha + 'T12:00:00');
    if (isNaN(d)) return;
    var key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    if (!byMonth[key]) byMonth[key] = [];
    byMonth[key].push(ev);
  });

  // Filtrar solo meses futuros o actuales
  var now = new Date();
  var currentKey = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');

  var keys = Object.keys(byMonth).sort();
  var html = '';

  keys.forEach(function(key){
    if (key < currentKey) return; // skip pasados
    var items = byMonth[key].sort(function(a,b){ return a.fecha.localeCompare(b.fecha); });
    var parts = key.split('-');
    var monthName = MESES[parseInt(parts[1])-1] + ' ' + parts[0];

    html += '<div class="month-section"><div class="month-title">' + monthName + '</div><div class="event-list">';
    items.forEach(function(ev){
      var d = new Date(ev.fecha + 'T12:00:00');
      var dayStr = String(d.getDate()).padStart(2,'0') + ' ' + MESES[d.getMonth()].substring(0,3);
      var tipo = ev.tipo || 'otro';
      var dotColor = dotColors[tipo] || '#999';
      var desc = ev.descripcion || ev.desc || '';
      var descHtml = desc ? ' — ' + desc : '';
      html += '<div class="event"><div class="event-dot" style="background:' + dotColor + '"></div><div class="event-date">' + dayStr + '</div><div class="event-text"><strong>' + ev.titulo + '</strong>' + descHtml + '</div><div class="event-tag ' + tipo + '">' + tipo.replace('cumpleanos','Cumpleaños').replace('evaluacion','Evaluación').replace('capacitacion','Capacitación').replace('feriado','Feriado').replace('contrato','Contrato').replace('otro','Otro') + '</div></div>';
    });
    html += '</div></div>';
  });

  if (!html) html = '<div style="text-align:center;padding:40px;color:#555">No hay eventos próximos</div>';
  document.getElementById('calendar-content').innerHTML = html;
}

// Start with feriados
var allEvents = feriados.slice();

// Try API
var API_URL = localStorage.getItem('bc_hr_api_url');
if (API_URL) {
  Promise.all([
    fetch(API_URL + '?tab=eventos').then(function(r){ return r.json(); }),
    fetch(API_URL + '?tab=equipo').then(function(r){ return r.json(); })
  ]).then(function(results){
    var eventos = results[0];
    var equipo = results[1];

    // Agregar eventos del sheet
    if (Array.isArray(eventos)) {
      eventos.forEach(function(ev){ allEvents.push(ev); });
    }

    // Generar cumpleaños del equipo
    if (Array.isArray(equipo)) {
      equipo.forEach(function(p){
        if (p.cumpleanos && (p.estado || 'Activo') === 'Activo') {
          var parts = p.cumpleanos.split('-');
          if (parts.length >= 2) {
            var cumple2026 = '2026-' + parts[1] + '-' + parts[2];
            allEvents.push({fecha: cumple2026, titulo: 'Cumpleaños ' + p.nombre, tipo: 'cumpleanos', descripcion: p.cargo + ' · ' + p.local});
          }
        }
      });
    }

    document.getElementById('dataSource').textContent = 'Live · Google Sheet';
    document.getElementById('dataSource').className = 'source-tag live';
    renderCalendar(allEvents);
  }).catch(function(e){
    console.log('API error, using static:', e);
    renderCalendar(allEvents);
  });
} else {
  renderCalendar(allEvents);
}
</script>
</body>
</html>
