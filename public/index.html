const today = new Date('2026-04-19');
const daysAgo = (n) => { const d = new Date(today); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); };

const phaseOrder = ['F1','F2','F3','F4','F5'];

function buildProceso(id, candidato, track, cargo, local, fase, completedByPhase, notas, daysAgoN){
  const flatCompleted = [];
  for (const [p, count] of Object.entries(completedByPhase)) {
    for (let i=0; i<count; i++) flatCompleted.push(`${track}-${p.toLowerCase()}-${i}`);
  }
  // compute avance
  let total = 0;
  for (const p of phaseOrder) total += (CHECKLISTS[track][p] || []).length;
  const avance = Math.round((flatCompleted.length / total) * 100);
  return { id, idProceso:`RC${1000+id}`, candidato, track, cargo, local, fase, completados:flatCompleted, notas, fechaInicio:daysAgo(daysAgoN), avance };
}

  'F1':'F1 Captación','F2':'F2 Entrevista',

};
const NOTION_TO_FASE = Object.fromEntries(Object.entries(FASE_TO_NOTION).map(([k,v])=>[v,k]));

const CARGO_TRACK = {
  'Garzón/a':'garzones','Copero/a':'garzones','Entrenador/a':'garzones',
  'Jefe de Local':'jefatura','Sub Jefe':'jefatura','Jefe de Sub':'jefatura',
  'Jefe de Cocina':'cocineros','Sous Chef':'cocineros','Cocinero/a':'cocineros'
};

let _localIdCounter = 1;
function notionToApp(n) {
  const cargo   = n.cargo || 'Garzón/a';
  const track   = CARGO_TRACK[cargo] || 'garzones';
  const fase    = NOTION_TO_FASE[n.fase] || n.fase || 'F1';
  const completados = Array.isArray(n.items_completados) ? n.items_completados : [];
  const descartado  = n.estado === 'Descartado';
  let total = 0;
  for (const p of ['F1','F2','F3','F4','F5']) total += (CHECKLISTS[track]?.[p]||[]).length;
  const avance = total > 0 ? Math.round(completados.length / total * 100) : (n.avance||0);
  return {
    id: _localIdCounter++,
    notionId: n.id,
    idProceso: n.idProceso ? `RC${n.idProceso}` : `RC${1000+_localIdCounter}`,
    candidato: n.candidato, track, cargo,
    local: n.local || 'BC1',
    fase, completados, notas: n.notas || '',
    fechaInicio: n.fechaInicio || new Date().toISOString().split('T')[0],
    avance, descartado,
    motivoDescarte: descartado ? (n.motivoDescarte||'') : undefined,
    fechaDescarte:  descartado ? (n.fechaDescarte||n.fechaInicio) : undefined
  };
}

async function apiPatch(notionId, payload) {
  try {

    });
  } catch(e) { console.error('Notion PATCH error:', e); }

async function apiPost(payload) {
  const res = await fetch('/api/procesos', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error('Error creando proceso en Notion');
  return await res.json();
}

/* ============ HELPERS ============ */
function getTotal(track){
  let t = 0; for (const p of phaseOrder) t += (CHECKLISTS[track][p]||[]).length; return t;
}
function progressByPhase(proc, phase){
  const total = (CHECKLISTS[proc.track][phase]||[]).length;
  if (!total) return {done:0,total:0,pct:0};
  const done = proc.completados.filter(id=>id.startsWith(`${proc.track}-${phase.toLowerCase()}-`)).length;
  return { done, total, pct: Math.round(done/total*100) };
}
function initials(name){
  return name.split(' ').slice(0,2).map(s=>s[0]).join('').toUpperCase();
}
function formatAge(dateStr){
  const d = new Date(dateStr); const diff = Math.floor((today - d)/(1000*60*60*24));
  if (diff===0) return 'hoy'; if (diff===1) return 'ayer'; if (diff<7) return `hace ${diff}d`;
  if (diff<30) return `hace ${Math.floor(diff/7)}sem`; return `hace ${Math.floor(diff/30)}m`;
}

/* ============ TWEAKS ============ */
function useTweaks(){
  const [t, setT] = React.useState(TWEAKS_DEFAULTS);
  const [edit, setEdit] = React.useState(false);
  React.useEffect(()=>{
    const onMsg = (e)=>{
      if(!e.data) return;
      if(e.data.type==='__activate_edit_mode') setEdit(true);
      if(e.data.type==='__deactivate_edit_mode') setEdit(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return ()=>window.removeEventListener('message', onMsg);
  },[]);
  const update = (patch)=>{
    setT(prev=>{
      const next = {...prev, ...patch};
      window.parent.postMessage({type:'__edit_mode_set_keys', edits:patch}, '*');
      return next;
    });
  };
  return [t, update, edit];
}

/* Candidate card (kanban) */

    <div

        <Avatar name={proc.candidato} track={proc.track} size={30} />

          <div className="kcard-name" style={{fontSize:13, fontWeight:600, color:'#fff', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{proc.candidato}</div>
          <div style={{fontSize:10, color:'var(--text-3)'}}>{proc.idProceso} · {formatAge(proc.fechaInicio)}</div>
        </div>
      </div>
      <div style={{fontSize:11, color:'var(--text-2)', display:'flex', gap:6, alignItems:'center'}}>
        <Tag tone={localTone(proc.local)}>{proc.local}</Tag>

      {proc.notas && (
        <div style={{fontSize:11, color:'var(--text-2)', fontStyle:'italic', lineHeight:1.4, borderLeft:'2px solid var(--border-2)', paddingLeft:8,
          display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden'}}>
          {proc.notas}
        </div>
      )}
      <div>
        <div style={{display:'flex', justifyContent:'space-between', fontSize:10, color:'var(--text-3)', letterSpacing:'1px', fontWeight:700, marginBottom:4}}>
          <span>{proc.fase} · {done}/{total}</span>

const KanbanBoard = ({procesos, onOpen, activeId, onMove}) => {
  const [dragOver, setDragOver] = React.useState(null);
  return (
    <div style={{padding:'20px 40px', display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:12, alignItems:'start'}}>
      {PHASES.map(ph => {
        const col = procesos.filter(p => p.fase === ph.id);
        const hoverOn = dragOver === ph.id;
        return (
          <div key={ph.id}
            onDragOver={(e)=>{ e.preventDefault(); setDragOver(ph.id); }}
            onDragLeave={()=>setDragOver(null)}
            onDrop={(e)=>{
              e.preventDefault(); setDragOver(null);
              const id = +e.dataTransfer.getData('text/plain');
              if (id) onMove(id, ph.id);
            }}
            style={{
              background:'var(--card)', borderRadius:12,
              border:`1px solid ${hoverOn ? 'var(--gold)' : 'var(--border)'}`,
              transition:'border-color 0.15s', minHeight: 320,
            }}>
            <div style={{padding:'12px 14px', borderBottom:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <div>
                <div style={{fontSize:10, color:'var(--gold)', fontWeight:700, letterSpacing:'1.5px'}}>{ph.id}</div>
                <div style={{fontSize:13, color:'#fff', fontWeight:600}}>{ph.name}</div>
              </div>
              <div style={{fontSize:11, color:'var(--text-3)', fontWeight:700,
                background:'var(--card-3)', padding:'3px 8px', borderRadius:10, minWidth:24, textAlign:'center'}}>{col.length}</div>
            </div>
            <div className="kcol-items" style={{padding:10, display:'flex', flexDirection:'column', gap:10}}>
              {col.length === 0 && (
                <div style={{padding:'24px 12px', textAlign:'center', color:'var(--text-3)', fontSize:11, fontStyle:'italic', border:'1px dashed var(--border)', borderRadius:8}}>
                  Sin candidatos
                </div>
              )}
              {col.map(p => (
                <KanbanCard key={p.id} proc={p} active={activeId===p.id} onClick={onOpen} />
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
};

/* Candidate drawer */
const CandidateDrawer = ({proc, onClose, onToggle, onAdvance, onUpdateNotas, onDiscard, onRestore, onDelete}) => {
  if (!proc) return null;
  const profile = PROFILES[proc.track];
  const [notesDraft, setNotesDraft] = React.useState(proc.notas);
  React.useEffect(()=>setNotesDraft(proc.notas), [proc.id]);

  const phaseIdx = phaseOrder.indexOf(proc.fase);
  return (
    <>
      <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', zIndex:40, backdropFilter:'blur(4px)'}} />
      <aside style={{
        position:'fixed', top:0, right:0, bottom:0, width:'min(560px, 90vw)', zIndex:50,
        background:'var(--bg-2)', borderLeft:'1px solid var(--border)', overflowY:'auto',
        boxShadow:'-30px 0 60px rgba(0,0,0,0.5)',
        animation:'slideIn 0.25s ease-out'
      }}>
        <style>{`@keyframes slideIn { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }`}</style>

        {/* Top */}
        <div style={{padding:'24px 28px 20px', borderBottom:'1px solid var(--border)', position:'sticky', top:0, background:'var(--bg-2)', zIndex:2}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:16, marginBottom:16}}>
            <div style={{display:'flex', gap:14, alignItems:'center'}}>
              <Avatar name={proc.candidato} track={proc.track} size={48} />
              <div>
                <h2 className="serif" style={{fontSize:22, color:'#fff', fontWeight:600, letterSpacing:'-0.3px'}}>{proc.candidato}</h2>
                <div style={{display:'flex', gap:6, alignItems:'center', marginTop:4}}>
                  <span style={{fontSize:11, color:'var(--text-3)', fontWeight:700, letterSpacing:'1px'}}>{proc.idProceso}</span>
                  <span style={{color:'var(--text-3)'}}>·</span>
                  <span style={{fontSize:12, color:'var(--text-2)'}}>{proc.cargo}</span>
                  <Tag tone={localTone(proc.local)}>{proc.local}</Tag>
                </div>
              </div>
            </div>
            <button onClick={onClose} style={{color:'var(--text-2)', fontSize:20, padding:4}}>✕</button>
          </div>

          {/* Phase stepper */}
          <div style={{display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:4, marginBottom:6}}>
            {PHASES.map((ph, i) => {
              const { done, total } = progressByPhase({ ...proc }, ph.id);
              const isCurrent = i === phaseIdx;
              const isPast = i < phaseIdx || (i===phaseIdx && done===total && total>0);
              const isFuture = i > phaseIdx;
              return (
                <div key={ph.id} onClick={()=>onAdvance(proc.id, ph.id)}
                  style={{cursor:'pointer', padding:'8px 6px', borderRadius:6,
                    background: isCurrent ? 'var(--gold-dim)' : 'transparent',
                    border: isCurrent ? '1px solid var(--gold)' : '1px solid transparent',
                    opacity: isFuture ? 0.45 : 1
                  }}>
                  <div style={{height:3, background: isPast ? 'var(--bc1)' : isCurrent ? 'var(--gold)' : 'var(--border-2)', borderRadius:2, marginBottom:6}} />
                  <div style={{fontSize:10, color: isCurrent ? 'var(--gold)' : 'var(--text-3)', fontWeight:700, letterSpacing:'1px'}}>{ph.id}</div>
                  <div style={{fontSize:11, color: isCurrent ? '#fff' : 'var(--text-2)', fontWeight:600}}>{ph.name}</div>
                </div>
              );
            })}
          </div>
          <div style={{fontSize:10, color:'var(--text-3)', letterSpacing:'0.5px'}}>Click una fase para moverlo · Drag en el kanban también funciona</div>
        </div>

        {/* Profile & Eval */}
        <section style={{padding:'20px 28px', borderBottom:'1px solid var(--border)'}}>
          <h3 style={{fontSize:10, color:'var(--text-3)', letterSpacing:'1.5px', fontWeight:700, textTransform:'uppercase', marginBottom:10}}>Perfil del cargo</h3>
          <div style={{background:'var(--card)', border:'1px solid var(--border)', borderRadius:10, padding:16}}>
            <div className="serif" style={{fontSize:15, color:'#fff', fontWeight:600, marginBottom:8}}>{profile.title}</div>
            <dl style={{display:'grid', gridTemplateColumns:'110px 1fr', gap:'6px 12px', fontSize:12}}>
              <dt style={{color:'var(--text-3)', fontWeight:600}}>Experiencia</dt><dd style={{color:'var(--text)'}}>{profile.experience}</dd>
              <dt style={{color:'var(--text-3)', fontWeight:600}}>Rango</dt><dd style={{color:'var(--text)'}}>{profile.age}</dd>
              <dt style={{color:'var(--text-3)', fontWeight:600}}>Competencias</dt><dd style={{color:'var(--text)'}}>{profile.competencies}</dd>
              <dt style={{color:'var(--text-3)', fontWeight:600}}>Requisitos</dt><dd style={{color:'var(--text)'}}>{profile.requisitos}</dd>
            </dl>
            <div style={{marginTop:12, padding:'10px 12px', background:'var(--gold-dim)', borderLeft:'3px solid var(--gold)', borderRadius:4, fontSize:12, color:'var(--gold)'}}>
              ⚡ {profile.highlight}
            </div>
          </div>

          {profile.eval.length>0 && (
            <div style={{marginTop:14}}>
              <div style={{fontSize:10, color:'var(--text-3)', letterSpacing:'1.5px', fontWeight:700, textTransform:'uppercase', marginBottom:8}}>Pauta de evaluación</div>
              <div style={{display:'grid', gap:6}}>
                {profile.eval.map((it, i) => {
                  const idKey = `${proc.track}-eval-${i}`;
                  const checked = proc.completados.includes(idKey);
                  return (
                    <label key={i} style={{display:'flex', gap:10, alignItems:'center', padding:'8px 10px', background:'var(--card)', border:'1px solid var(--border)', borderRadius:6, cursor:'pointer'}}>
                      <input type="checkbox" checked={checked} onChange={()=>onToggle(proc.id, idKey)} style={{accentColor:'var(--gold)', width:16, height:16}} />
                      <span style={{fontSize:12, color: checked ? 'var(--gold)':'var(--text)', textDecoration: checked?'line-through':'none'}}>{it}</span>
                    </label>
                  );
                })}
              </div>
            </div>
          )}
        </section>

        {/* Checklists */}
        <section style={{padding:'20px 28px', borderBottom:'1px solid var(--border)'}}>
          <h3 style={{fontSize:10, color:'var(--text-3)', letterSpacing:'1.5px', fontWeight:700, textTransform:'uppercase', marginBottom:12}}>Checklist por fase</h3>
          {phaseOrder.map(phaseId => {
            const items = CHECKLISTS[proc.track][phaseId] || [];
            const ph = PHASES.find(p=>p.id===phaseId);
            const { done, total, pct } = progressByPhase(proc, phaseId);
            const isCurrent = phaseId === proc.fase;
            return (
              <details key={phaseId} open={isCurrent} style={{marginBottom:8, background:'var(--card)', border:`1px solid ${isCurrent ? 'var(--gold)' : 'var(--border)'}`, borderRadius:10, overflow:'hidden'}}>
                <summary style={{padding:'12px 14px', display:'flex', alignItems:'center', gap:10, cursor:'pointer', listStyle:'none'}}>
                  <div style={{fontSize:10, color:'var(--gold)', fontWeight:700, letterSpacing:'1px'}}>{phaseId}</div>
                  <div style={{fontSize:13, color:'#fff', fontWeight:600, flex:1}}>{ph.name}</div>
                  <div style={{fontSize:11, color:'var(--text-2)'}}>{done}/{total}</div>
                  <div style={{width:48, height:3, background:'#0a0a0a', borderRadius:2, overflow:'hidden'}}>
                    <div style={{height:'100%', width:`${pct}%`, background: pct===100 ? 'var(--bc1)' : 'var(--gold)'}} />
                  </div>
                </summary>
                <div style={{padding:'4px 14px 14px', display:'grid', gap:6}}>
                  {items.map((text, i) => {
                    const idKey = `${proc.track}-${phaseId.toLowerCase()}-${i}`;
                    const checked = proc.completados.includes(idKey);
                    return (
                      <label key={i} style={{display:'flex', gap:10, alignItems:'flex-start', padding:'9px 10px', background:'var(--card-2)', border:'1px solid var(--border)', borderRadius:6, cursor:'pointer'}}>
                        <input type="checkbox" checked={checked} onChange={()=>onToggle(proc.id, idKey)} style={{accentColor:'var(--gold)', width:16, height:16, marginTop:1, flexShrink:0}} />
                        <span style={{fontSize:12.5, lineHeight:1.5, color: checked ? 'var(--gold)':'var(--text)', textDecoration: checked?'line-through':'none'}}>{text}</span>
                      </label>
                    );
                  })}
                  {phaseId==='F3' && (
                    <div style={{display:'flex', gap:8, marginTop:8}}>
                      <button onClick={()=>onAdvance(proc.id, 'F4')} style={{flex:1, padding:10, background:'rgba(106,184,106,0.15)', border:'1px solid var(--bc1)', color:'var(--bc1)', borderRadius:6, fontSize:11, fontWeight:700, letterSpacing:'1px', textTransform:'uppercase'}}>✓ Continúa a F4</button>
                      <button style={{flex:1, padding:10, background:'rgba(224,128,128,0.12)', border:'1px solid var(--red)', color:'var(--red)', borderRadius:6, fontSize:11, fontWeight:700, letterSpacing:'1px', textTransform:'uppercase'}}>✗ Termina proceso</button>
                    </div>
                  )}
                  {phaseId==='F4' && (
                    <div style={{padding:'10px 12px', background:'rgba(224,128,128,0.08)', borderLeft:'3px solid var(--red)', borderRadius:4, fontSize:11.5, color:'var(--text)', marginTop:6}}>
                      ⚠️ Antes del contrato indefinido: consultar con jefatura si seguirá antes de emitirlo.
                    </div>
                  )}
                </div>
              </details>
            );
          })}
        </section>

        {/* Discard banner */}
        {proc.descartado && (
          <section style={{padding:'16px 28px', background:'rgba(224,128,128,0.06)', borderBottom:'1px solid var(--border)'}}>
            <div style={{display:'flex', alignItems:'flex-start', gap:10}}>
              <div style={{fontSize:18}}>🚫</div>
              <div style={{flex:1}}>
                <div style={{fontSize:12, color:'var(--red)', fontWeight:700, letterSpacing:'1px', textTransform:'uppercase'}}>Proceso descartado</div>
                <div style={{fontSize:12, color:'var(--text-2)', marginTop:2}}>
                  <strong style={{color:'var(--text)'}}>Motivo:</strong> {proc.motivoDescarte || '—'}
                </div>
                <div style={{fontSize:11, color:'var(--text-3)', marginTop:2}}>Descartado {proc.fechaDescarte ? `el ${proc.fechaDescarte}` : ''}</div>
              </div>
              <button onClick={()=>onRestore(proc.id)} style={{padding:'7px 12px', background:'var(--bc1-dim)', border:'1px solid var(--bc1)', color:'var(--bc1)', borderRadius:6, fontSize:11, fontWeight:700, letterSpacing:'0.8px', textTransform:'uppercase'}}>↺ Restaurar</button>
            </div>
          </section>
        )}

        {/* Notes */}
        <section style={{padding:'20px 28px 20px'}}>
          <h3 style={{fontSize:10, color:'var(--text-3)', letterSpacing:'1.5px', fontWeight:700, textTransform:'uppercase', marginBottom:10}}>Notas del proceso</h3>
          <textarea
            value={notesDraft}
            onChange={e=>setNotesDraft(e.target.value)}
            onBlur={()=>onUpdateNotas(proc.id, notesDraft)}
            placeholder="Observaciones, feedback de jefaturas, pendientes…"
            style={{width:'100%', minHeight:110, padding:14, background:'var(--card)', border:'1px solid var(--border)', borderRadius:10, color:'var(--text)', fontSize:13, resize:'vertical', lineHeight:1.55, outline:'none'}} />
          <div style={{display:'flex', justifyContent:'space-between', marginTop:10, fontSize:11, color:'var(--text-3)'}}>
            <span>Proceso iniciado {formatAge(proc.fechaInicio)} · {proc.fechaInicio}</span>
            <span>Se guarda en Notion al desenfocar</span>
          </div>
        </section>

        {/* Danger zone */}
        <section style={{padding:'0 28px 40px'}}>
          <div style={{background:'var(--card)', border:'1px solid var(--border)', borderRadius:10, padding:16}}>
            <div style={{fontSize:10, color:'var(--text-3)', letterSpacing:'1.5px', fontWeight:700, textTransform:'uppercase', marginBottom:10}}>Acciones del proceso</div>
            {!proc.descartado && (
              <button onClick={()=>onDiscard(proc.id)} style={{width:'100%', padding:'10px 12px', background:'rgba(224,128,128,0.08)', border:'1px solid rgba(224,128,128,0.35)', color:'var(--red)', borderRadius:8, fontSize:12, fontWeight:600, textAlign:'left', display:'flex', alignItems:'center', gap:10, marginBottom:8}}>
                <span style={{fontSize:14}}>🚫</span>
                <span style={{flex:1}}>Descartar candidato</span>
                <span style={{fontSize:10, color:'var(--text-3)', letterSpacing:'0.5px'}}>Queda registro</span>
              </button>
            )}
            <button onClick={()=>{
              if (confirm(`¿Eliminar definitivamente a ${proc.candidato}?\n\nEsta acción no se puede deshacer y borra el registro de Notion.`)) onDelete(proc.id);
            }} style={{width:'100%', padding:'10px 12px', background:'transparent', border:'1px solid var(--border-2)', color:'var(--text-3)', borderRadius:8, fontSize:12, fontWeight:600, textAlign:'left', display:'flex', alignItems:'center', gap:10}}>
              <span style={{fontSize:14}}>🗑</span>
              <span style={{flex:1}}>Eliminar definitivamente</span>
              <span style={{fontSize:10, color:'var(--text-3)', letterSpacing:'0.5px'}}>Sin registro</span>
            </button>
          </div>
        </section>
      </aside>
    </>
  );
};

/* Discard Modal */
const DiscardModal = ({proc, onClose, onConfirm}) => {
  const [reason, setReason] = React.useState('');
  const [custom, setCustom] = React.useState('');
  if (!proc) return null;
  const PRESETS = ['No cumple perfil','No se presentó al día de prueba','Desistió el candidato','Referencias negativas','Documentación incompleta','Desempeño insuficiente en prueba'];
  const final = reason==='__custom' ? custom : reason;
  return (
    <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.75)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', backdropFilter:'blur(6px)'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'var(--bg-2)', border:'1px solid var(--red)', borderRadius:14, padding:26, width:'min(460px, 92vw)'}}>
        <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:6}}>
          <span style={{fontSize:22}}>🚫</span>
          <div className="serif" style={{fontSize:20, color:'#fff', fontWeight:600}}>Descartar a {proc.candidato}</div>

/* ============ METRICS VIEW ============ */
const MetricsView = ({procesos}) => {
  const now = new Date();
  const daysDiff = (dateStr) => dateStr ? Math.max(0, Math.floor((now - new Date(dateStr)) / 86400000)) : 0;

  const allProcs = procesos;
  const active   = procesos.filter(p => !p.descartado);
  const discarded = procesos.filter(p => p.descartado);
  const inF5     = active.filter(p => p.fase === 'F5');
  const globalConv = allProcs.length > 0 ? Math.round(inF5.length / allProcs.length * 100) : 0;

  // Funnel: candidates at each phase or beyond (cumulative)
  const phaseCumul = phaseOrder.map((ph, i) =>
    active.filter(p => phaseOrder.indexOf(p.fase) >= i).length
  );
  const maxFunnel = Math.max(phaseCumul[0] || 1, 1);

  // Phase-to-phase conversion rate
  const phaseConv = phaseCumul.map((c, i) =>
    i === 0 ? 100 : phaseCumul[i-1] > 0 ? Math.round(c / phaseCumul[i-1] * 100) : 0
  );

  // Drop count between phases (those that didn't advance)
  const phaseDrop = phaseCumul.map((c, i) =>
    i >= phaseCumul.length - 1 ? 0 : c - phaseCumul[i+1]
  );

  // By track stats
  const trackStats = Object.entries(TRACKS).map(([key, def]) => ({
    key, ...def,
    active: active.filter(p => p.track === key).length,
    disc:   discarded.filter(p => p.track === key).length,
  }));

  // By local stats
  const localStats = ['BC1','BC2'].map(loc => ({
    loc, tone: localTone(loc),
    active: active.filter(p => p.local === loc).length,
    disc:   discarded.filter(p => p.local === loc).length,
  }));

  // Discard reasons
  const reasons = {};
  discarded.forEach(p => { const r = p.motivoDescarte || 'Sin motivo'; reasons[r] = (reasons[r]||0)+1; });
  const sortedReasons = Object.entries(reasons).sort((a,b) => b[1]-a[1]).slice(0,6);
  const maxReason = sortedReasons[0]?.[1] || 1;

  // Avg days per phase (active procesos currently in that phase)
  const avgByPhase = phaseOrder.map(ph => {
    const inPhase = active.filter(p => p.fase === ph);
    return {
      ph,
      count: inPhase.length,
      avg: inPhase.length ? Math.round(inPhase.reduce((s,p) => s + daysDiff(p.fechaInicio), 0) / inPhase.length) : null,
    };
  });
  const avgGlobal = active.length ? Math.round(active.reduce((s,p) => s + daysDiff(p.fechaInicio), 0) / active.length) : 0;

  const StatCard = ({label, value, sub, tone='default'}) => {
    const colors = { default:'var(--text)', gold:'var(--gold)', bc1:'var(--bc1)', red:'var(--red)', blue:'var(--blue)' };
    return (
      <div style={{background:'var(--card)', border:'1px solid var(--border)', borderRadius:12, padding:'18px 20px', display:'flex', flexDirection:'column', gap:4}}>
        <div style={{fontSize:10, color:'var(--text-3)', letterSpacing:'1.5px', fontWeight:700, textTransform:'uppercase'}}>{label}</div>
        <div style={{fontSize:32, fontWeight:700, color:colors[tone]||colors.default, fontFamily:'Fraunces', lineHeight:1.1}}>{value}</div>
        {sub && <div style={{fontSize:11, color:'var(--text-3)', marginTop:2}}>{sub}</div>}
      </div>
    );
  };

  return (
    <div style={{padding:'20px 40px 28px', background:'linear-gradient(180deg,rgba(122,176,224,0.04) 0%,transparent 100%)', borderBottom:'1px solid var(--border)'}}>

      {/* Title row */}
      <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:18}}>
        <div style={{fontSize:10, color:'var(--blue)', letterSpacing:'2px', fontWeight:700, textTransform:'uppercase'}}>📊 Métricas ATS</div>
        <div style={{flex:1, height:1, background:'var(--border)'}} />
        <div style={{fontSize:11, color:'var(--text-3)'}}>{allProcs.length} procesos registrados en Notion</div>
      </div>

      {/* Stat cards */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:12, marginBottom:24}}>
        <StatCard label="Total procesos" value={allProcs.length} sub="Histórico completo" />
        <StatCard label="En pipeline" value={active.length} sub="Candidatos activos" tone="gold" />
        <StatCard label="En onboarding" value={inF5.length} sub="Fase F5 activa" tone="bc1" />
        <StatCard label="Descartados" value={discarded.length} sub={`${allProcs.length>0?Math.round(discarded.length/allProcs.length*100):0}% del total`} tone="red" />
        <StatCard label="Conversión global" value={`${globalConv}%`} sub="Llegaron a F5 / total" tone="blue" />
      </div>

      {/* Funnel */}
      <div style={{background:'var(--card)', border:'1px solid var(--border)', borderRadius:12, padding:'22px 26px', marginBottom:24}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:18}}>
          <div style={{fontSize:10, color:'var(--text-3)', letterSpacing:'1.5px', fontWeight:700, textTransform:'uppercase'}}>Funnel de Reclutamiento · Candidatos activos por fase</div>
          <div style={{fontSize:10, color:'var(--text-3)'}}>Acumulativo — incluye candidatos en fases posteriores</div>
        </div>
        {PHASES.map((ph, i) => {
          const count = phaseCumul[i];
          const barPct = Math.round(count / maxFunnel * 100);
          const drop = phaseDrop[i];
          const conv = phaseConv[i];
          const convColor = conv >= 70 ? 'var(--bc1)' : conv >= 40 ? 'var(--gold)' : 'var(--red)';
          return (
            <div key={ph.id} style={{display:'grid', gridTemplateColumns:'90px 1fr 140px', alignItems:'center', gap:16, marginBottom:i < PHASES.length-1 ? 10 : 0}}>
              <div>
                <div style={{fontSize:10, color:'var(--gold)', fontWeight:700, letterSpacing:'1px', marginBottom:1}}>{ph.id}</div>
                <div style={{fontSize:12, color:'#fff', fontWeight:600}}>{ph.name}</div>
                <div style={{fontSize:10, color:'var(--text-3)'}}>{ph.sub}</div>
              </div>
              <div style={{position:'relative', height:36, background:'var(--card-2)', borderRadius:8, overflow:'hidden'}}>
                <div style={{
                  position:'absolute', top:0, left:0, bottom:0, width:`${barPct}%`,
                  background:`linear-gradient(90deg, rgba(212,175,55,0.35), rgba(212,175,55,0.15))`,
                  borderRight: count > 0 ? '2px solid var(--gold)' : 'none',
                  transition:'width 0.6s ease', minWidth: count > 0 ? 4 : 0,
                }} />
                <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', padding:'0 14px'}}>
                  <span style={{fontSize:18, fontWeight:700, color:'#fff', fontFamily:'Fraunces'}}>{count}</span>
                  <span style={{fontSize:10, color:'var(--text-2)', marginLeft:6}}>candidato{count!==1?'s':''}</span>
                </div>
              </div>
              <div style={{display:'flex', gap:12, justifyContent:'flex-end', alignItems:'center'}}>
                {i > 0 && (
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:14, fontWeight:700, color:convColor}}>{conv}%</div>
                    <div style={{fontSize:9, color:'var(--text-3)', letterSpacing:'0.5px', textTransform:'uppercase'}}>vs F{i}</div>
                  </div>
                )}
                {drop > 0 && (
                  <div style={{textAlign:'center', padding:'4px 8px', background:'var(--red-dim)', borderRadius:6}}>
                    <div style={{fontSize:13, fontWeight:700, color:'var(--red)'}}>−{drop}</div>
                    <div style={{fontSize:9, color:'var(--red)', letterSpacing:'0.5px'}}>no pasan</div>
                  </div>
                )}
                {i > 0 && drop === 0 && count > 0 && (
                  <div style={{padding:'4px 8px', background:'rgba(106,184,106,0.12)', borderRadius:6}}>
                    <div style={{fontSize:9, color:'var(--bc1)', fontWeight:700, letterSpacing:'0.5px'}}>SIN BAJA</div>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* 3-column grid */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:16, marginBottom:20}}>

        {/* By track */}
        <div style={{background:'var(--card)', border:'1px solid var(--border)', borderRadius:12, padding:'18px 20px'}}>
          <div style={{fontSize:10, color:'var(--text-3)', letterSpacing:'1.5px', fontWeight:700, textTransform:'uppercase', marginBottom:14}}>Por track</div>
          {trackStats.map((t, idx) => {
            const total = t.active + t.disc;
            const pct = allProcs.length > 0 ? Math.round(total / allProcs.length * 100) : 0;
            return (
              <div key={t.key} style={{display:'flex', alignItems:'center', gap:12, marginBottom: idx < trackStats.length-1 ? 14 : 0, paddingBottom: idx < trackStats.length-1 ? 14 : 0, borderBottom: idx < trackStats.length-1 ? '1px solid var(--border)' : 'none'}}>
                <div style={{fontSize:22}}>{t.icon}</div>
                <div style={{flex:1}}>
                  <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:4}}>
                    <div style={{fontSize:12, color:'#fff', fontWeight:600}}>{t.label}</div>
                    <div style={{fontSize:14, fontWeight:700, color:t.color, fontFamily:'Fraunces'}}>{total}</div>
                  </div>
                  <div style={{height:3, background:'var(--card-2)', borderRadius:2, overflow:'hidden', marginBottom:4}}>
                    <div style={{height:'100%', width:`${pct}%`, background:t.color, opacity:0.7, borderRadius:2}} />
                  </div>
                  <div style={{display:'flex', gap:8, fontSize:10}}>
                    <span style={{color:'var(--text-2)'}}>{t.active} activos</span>
                    {t.disc > 0 && <span style={{color:'var(--red)'}}>· {t.disc} desc.</span>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Avg time per phase */}
        <div style={{background:'var(--card)', border:'1px solid var(--border)', borderRadius:12, padding:'18px 20px'}}>
          <div style={{fontSize:10, color:'var(--text-3)', letterSpacing:'1.5px', fontWeight:700, textTransform:'uppercase', marginBottom:14}}>Días promedio en pipeline</div>
          <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:16, padding:'12px 14px', background:'var(--gold-dim)', border:'1px solid rgba(212,175,55,0.2)', borderRadius:10}}>
            <div style={{fontSize:32, fontWeight:700, color:'var(--gold)', fontFamily:'Fraunces', lineHeight:1}}>{avgGlobal}</div>
            <div>
              <div style={{fontSize:12, color:'var(--gold)', fontWeight:600}}>días en promedio</div>
              <div style={{fontSize:10, color:'var(--text-3)'}}>desde inicio · candidatos activos</div>
            </div>
          </div>
          {avgByPhase.map(({ph, count, avg}) => {
            const phData = PHASES.find(p=>p.id===ph);
            const urgency = avg !== null && avg > 14 ? 'var(--red)' : avg > 7 ? 'var(--gold)' : 'var(--bc1)';
            return (
              <div key={ph} style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8, padding:'7px 0', borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                <div style={{display:'flex', gap:8, alignItems:'center'}}>
                  <span style={{fontSize:10, color:'var(--gold)', fontWeight:700, letterSpacing:'0.8px', minWidth:18}}>{ph}</span>
                  <span style={{fontSize:11, color:'var(--text-2)'}}>{phData.name}</span>
                </div>
                <div style={{textAlign:'right'}}>
                  {avg !== null ? (
                    <span>
                      <span style={{fontSize:13, fontWeight:700, color:urgency}}>{avg}</span>
                      <span style={{fontSize:10, color:'var(--text-3)', marginLeft:3}}>días · {count} cand.</span>
                    </span>
                  ) : (
                    <span style={{fontSize:10, color:'var(--text-3)', fontStyle:'italic'}}>sin datos</span>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        {/* Discard reasons + by local */}
        <div style={{background:'var(--card)', border:'1px solid var(--border)', borderRadius:12, padding:'18px 20px', display:'flex', flexDirection:'column'}}>
          <div style={{fontSize:10, color:'var(--text-3)', letterSpacing:'1.5px', fontWeight:700, textTransform:'uppercase', marginBottom:14}}>
            Motivos de descarte{discarded.length > 0 ? ` · ${discarded.length} total` : ''}
          </div>
          {discarded.length === 0 ? (
            <div style={{flex:1, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--text-3)', fontSize:12, fontStyle:'italic'}}>Sin descartados registrados</div>
          ) : (
            <div style={{flex:1}}>
              {sortedReasons.map(([reason, count]) => (
                <div key={reason} style={{marginBottom:10}}>
                  <div style={{display:'flex', justifyContent:'space-between', fontSize:11, marginBottom:4, gap:8}}>
                    <span style={{color:'var(--text)', flex:1, lineHeight:1.4}}>{reason}</span>
                    <span style={{color:'var(--red)', fontWeight:700, flexShrink:0}}>{count}</span>
                  </div>
                  <div style={{height:4, background:'var(--card-2)', borderRadius:2, overflow:'hidden'}}>
                    <div style={{height:'100%', width:`${Math.round(count/maxReason*100)}%`, background:'var(--red)', borderRadius:2, opacity:0.75}} />
                  </div>
                </div>
              ))}
            </div>
          )}
          <div style={{marginTop:16, paddingTop:14, borderTop:'1px solid var(--border)'}}>
            <div style={{fontSize:9, color:'var(--text-3)', letterSpacing:'1.2px', fontWeight:700, textTransform:'uppercase', marginBottom:10}}>Por local</div>
            {localStats.map(({loc, tone, active: a, disc: d}) => (
              <div key={loc} style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8}}>
                <Tag tone={tone}>{loc}</Tag>
                <div style={{fontSize:11, color:'var(--text-2)'}}>
                  <span style={{color:'#fff', fontWeight:600}}>{a}</span> activos
                  {d > 0 && <> · <span style={{color:'var(--red)'}}>{d}</span> desc.</>}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Footer note */}
      <div style={{padding:'12px 16px', background:'var(--card)', border:'1px solid var(--border)', borderRadius:8, display:'flex', gap:10, alignItems:'flex-start'}}>
        <span style={{fontSize:13, flexShrink:0}}>💡</span>
        <div style={{fontSize:11, color:'var(--text-3)', lineHeight:1.7}}>
          Métricas calculadas en tiempo real desde Notion. El <strong style={{color:'var(--text-2)'}}>funnel</strong> muestra candidatos <em>activos acumulados</em> por fase — quienes están en F3 también cuentan en F1 y F2. Los <strong style={{color:'var(--text-2)'}}>días promedio</strong> se calculan desde la fecha de inicio hasta hoy. La <strong style={{color:'var(--text-2)'}}>conversión global</strong> incluye descartados en el denominador.
        </div>
      </div>
    </div>
  );
};

/* ============ APP ============ */
function App(){
  const [procesos, setProcesos] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [syncError, setSyncError] = React.useState(null);
  const [activeProc, setActiveProc] = React.useState(null);
  const [track, setTrack] = React.useState('all');
  const [local, setLocal] = React.useState('all');
  const [query, setQuery] = React.useState('');
  const [showNew, setShowNew] = React.useState(false);
  const [view, setView] = React.useState('pipeline'); // pipeline | organigrama
  const [showMetrics, setShowMetrics] = React.useState(false);
  const [showDiscarded, setShowDiscarded] = React.useState(false);
  const [discardTarget, setDiscardTarget] = React.useState(null);
  const [tweaks, updateTweaks, editMode] = useTweaks();

  // Load procesos from Notion on mount
  React.useEffect(()=>{
    setLoading(true);
    fetch('/api/procesos?status=all')
      .then(r => r.json())
      .then(data => {
        _localIdCounter = 1;
        if (Array.isArray(data)) {
          setProcesos(data.map(n => notionToApp(n)));
        } else {
          console.warn('Notion returned unexpected data, using samples');
          setProcesos(SAMPLE_PROCESOS);
        }
      })
      .catch(err => {
        console.error('Error loading from Notion:', err);
        setSyncError('Sin conexión a Notion — mostrando datos de ejemplo');
        setProcesos(SAMPLE_PROCESOS);
      })
      .finally(() => setLoading(false));
  }, []);

  // Apply accent
  React.useEffect(()=>{
    const a = ACCENTS[tweaks.accent] || ACCENTS.gold;
    document.documentElement.style.setProperty('--gold', a.main);
    document.documentElement.style.setProperty('--gold-soft', a.soft);
    document.documentElement.style.setProperty('--gold-dim', a.dim);
  }, [tweaks.accent]);

  const filtered = procesos.filter(p => {
    if (showDiscarded ? !p.descartado : p.descartado) return false;
    if (track!=='all' && p.track!==track) return false;
    if (local!=='all' && p.local!==local) return false;
    if (query){
      const q = query.toLowerCase();
      if (!(p.candidato.toLowerCase().includes(q) || p.cargo.toLowerCase().includes(q) || (p.notas||'').toLowerCase().includes(q))) return false;
    }
    return true;
  });
  const discardedCount = procesos.filter(p=>p.descartado).length;

  const activeProcData = activeProc ? procesos.find(p=>p.id===activeProc) : null;

  const toggleItem = (procId, itemId) => {
    setProcesos(prev => prev.map(p => {
      if (p.id!==procId) return p;
      const has = p.completados.includes(itemId);
      const next = has ? p.completados.filter(x=>x!==itemId) : [...p.completados, itemId];
      const avance = Math.round(next.filter(x=>!x.includes('-eval-')).length / getTotal(p.track) * 100);
      if (p.notionId) apiPatch(p.notionId, { items_completados: next, avance });
      return { ...p, completados: next, avance };
    }));
  };
  const advancePhase = (procId, phase) => {
    setProcesos(prev => prev.map(p => {
      if (p.id!==procId) return p;
      if (p.notionId) apiPatch(p.notionId, { fase: FASE_TO_NOTION[phase] || phase });
      return { ...p, fase: phase };
    }));
  };
  const updateNotas = (procId, notas) => {
    setProcesos(prev => prev.map(p => {
      if (p.id!==procId) return p;
      if (p.notionId) apiPatch(p.notionId, { notas });
      return { ...p, notas };
    }));
  };
  const discardProc = (procId, motivo) => {
    const fecha = new Date().toISOString().slice(0,10);
    setProcesos(prev => prev.map(p => {
      if (p.id!==procId) return p;
      if (p.notionId) apiPatch(p.notionId, { estado: 'Descartado', notas: p.notas ? p.notas + `\nDescartado: ${motivo}` : `Descartado: ${motivo}` });
      return { ...p, descartado:true, motivoDescarte:motivo, fechaDescarte:fecha };
    }));
    setDiscardTarget(null);
    setActiveProc(null);
  };
  const restoreProc = (procId) => {
    setProcesos(prev => prev.map(p => {
      if (p.id!==procId) return p;
      if (p.notionId) apiPatch(p.notionId, { estado: 'En curso' });
      return { ...p, descartado:false, motivoDescarte:undefined, fechaDescarte:undefined };
    }));
  };
  const deleteProc = (procId) => { setProcesos(prev => prev.filter(p => p.id!==procId)); setActiveProc(null); };
  const createProc = async (form) => {
    const trackMap = { 'Garzón/a':'garzones','Copero/a':'garzones','Entrenador/a':'garzones',
      'Jefe de Local':'jefatura','Sub Jefe':'jefatura',
      'Jefe de Cocina':'cocineros','Sous Chef':'cocineros','Cocinero/a':'cocineros' };
    try {
      const notionData = await apiPost({ candidato: form.candidato, cargo: form.cargo, local: form.local, notas: form.notas });
      const newProc = notionToApp(notionData);
      setProcesos(prev => [newProc, ...prev]);
      setActiveProc(newProc.id);
    } catch(e) {
      console.error('Error creando en Notion:', e);
      // Fallback local
      const id = Math.max(0, ...procesos.map(p=>p.id)) + 1;
      const newProc = buildProceso(id, form.candidato, trackMap[form.cargo]||'garzones', form.cargo, form.local, 'F1', {}, form.notas, 0);
      setProcesos(prev => [newProc, ...prev]);
      setActiveProc(id);
    }
  };

  return (
    <div className={tweaks.density==='compact' ? 'compact' : ''}>
      {loading && (
        <div style={{position:'fixed',top:0,left:0,right:0,zIndex:9999,background:'rgba(212,175,55,0.12)',borderBottom:'1px solid rgba(212,175,55,0.3)',padding:'8px 20px',textAlign:'center',fontSize:12,color:'#d4af37',letterSpacing:'0.5px'}}>
          ⏳ Cargando procesos desde Notion…
        </div>
      )}
      {syncError && (
        <div style={{position:'fixed',top:0,left:0,right:0,zIndex:9999,background:'rgba(224,80,80,0.12)',borderBottom:'1px solid rgba(224,80,80,0.3)',padding:'8px 20px',textAlign:'center',fontSize:12,color:'#e05050',letterSpacing:'0.5px',cursor:'pointer'}} onClick={()=>setSyncError(null)}>
          ⚠ {syncError} · click para cerrar
        </div>
      )}
      <AppHeader procesos={procesos} onNew={()=>setShowNew(true)} currentView={view} onViewChange={setView}
        showMetrics={showMetrics} onToggleMetrics={()=>setShowMetrics(v=>!v)} />

      {showMetrics && view !== 'organigrama' && <MetricsView procesos={procesos} />}

      {view !== 'organigrama' && (
        <>
          <FilterBar track={track} setTrack={setTrack} query={query} setQuery={setQuery} local={local} setLocal={setLocal}
            showDiscarded={showDiscarded} setShowDiscarded={setShowDiscarded} discardedCount={discardedCount} />
          {showDiscarded && (
            <div style={{padding:'10px 40px', background:'rgba(224,128,128,0.04)', borderBottom:'1px solid var(--border)', fontSize:11.5, color:'var(--red)', letterSpacing:'0.5px', display:'flex', alignItems:'center', gap:8}}>
              <span>🚫</span><span>Mostrando procesos descartados · {discardedCount} registros</span>
            </div>
          )}
        </>
      )}

      {view==='pipeline' && (tweaks.layout==='kanban'
        ? <KanbanBoard procesos={filtered} onOpen={(p)=>setActiveProc(p.id)} activeId={activeProc} onMove={advancePhase} />
        : <ListView procesos={filtered} onOpen={(p)=>setActiveProc(p.id)} activeId={activeProc} />
      )}

      {view==='organigrama' && <OrganigramaPanel onClose={()=>setView('pipeline')} />}

      {tweaks.showOrganigrama && view==='pipeline' && (
        <div style={{padding:'0 40px 40px'}}>
          <button onClick={()=>setView('organigrama')}
            style={{display:'flex', gap:14, alignItems:'center', width:'100%', padding:'16px 20px', background:'var(--card)', border:'1px solid var(--border)', borderRadius:12, textAlign:'left'}}>
            <div style={{width:40, height:40, borderRadius:8, background:'var(--gold-dim)', border:'1px solid var(--gold)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18}}>🏢</div>
            <div style={{flex:1}}>
              <div style={{fontSize:13, color:'#fff', fontWeight:600}}>Ver organigrama completo</div>
              <div style={{fontSize:11, color:'var(--text-2)'}}>Dirección, administración y jefaturas BC1 / BC2 · 11 personas</div>
            </div>
            <span style={{color:'var(--gold)', fontSize:18}}>→</span>
          </button>
        </div>
      )}

      <footer style={{padding:'24px 40px', borderTop:'1px solid var(--border)', textAlign:'center', color:'var(--text-3)', fontSize:11}}>
        Black Chicken · Uso exclusivo RRHH · Sincronizado con Notion · Talentos@BlackChicken.cl
      </footer>

      {activeProcData && (
        <CandidateDrawer proc={activeProcData} onClose={()=>setActiveProc(null)}
          onToggle={toggleItem} onAdvance={(id,ph)=>advancePhase(id,ph)} onUpdateNotas={updateNotas}
          onDiscard={(id)=>setDiscardTarget(id)} onRestore={restoreProc} onDelete={deleteProc} />
      )}
      {discardTarget && (
        <DiscardModal proc={procesos.find(p=>p.id===discardTarget)} onClose={()=>setDiscardTarget(null)}
          onConfirm={(motivo)=>discardProc(discardTarget, motivo)} />
      )}
      <NewProcesoModal open={showNew} onClose={()=>setShowNew(false)} onCreate={createProc} />
      <TweaksPanel tweaks={tweaks} update={updateTweaks} visible={editMode} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
